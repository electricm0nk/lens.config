name: Kaylee Real Data Grounding
description: >
  Plugs the data and context gaps that cause Kaylee to hallucinate numbers and respond out of character
  in the fourdogs-central app. Covers cross-DB tool wiring, real query implementations, tool message
  format hygiene, and order-context injection from fourdogs-central into the kaylee session. Touches
  kaylee-agent, fourdogs-central, and terminus.infra (DBA grant).
